spring.application.name=gondorchic

spring.datasource.url=jdbc:postgresql://localhost:5432/gondorchic
spring.datasource.username=postgres
spring.datasource.password=touria_user
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialect explicite : évite « Unable to determine Dialect » si Hibernate n’obtient pas les métadonnées JDBC (ex. échec de connexion très tôt).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
